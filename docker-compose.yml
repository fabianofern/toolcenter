version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: toolcenter-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass}
      POSTGRES_DB: ${DB_NAME:-toolcenter}
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - toolcenter-network

  redis:
    image: redis:7-alpine
    container_name: toolcenter-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - toolcenter-network

volumes:
  postgres_data:
  redis_data:

networks:
  toolcenter-network:
    driver: bridge
